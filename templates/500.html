<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 — Server Error | LibraMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0f13; color: #e8e4dc;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .box { text-align: center; padding: 40px; }
  .num {
    font-family: 'Playfair Display', serif;
    font-size: 120px; line-height: 1;
    color: rgba(224,85,85,0.12);
    letter-spacing: -4px;
  }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin: 16px 0 8px; }
  p { color: #7d8090; font-size: 14px; margin-bottom: 28px; }
  a {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 8px;
    background: rgba(201,168,76,0.15); color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.3);
    text-decoration: none; font-size: 14px; font-weight: 500;
  }
</style>
</head>
<body>
<div class="box">
  <div class="num">500</div>
  <h1>Internal Server Error</h1>
  <p>Something went wrong on our end. Please try again or contact the administrator.</p>
  <a href="/dashboard/">← Back to Dashboard</a>
</div>
</body>
</html>
